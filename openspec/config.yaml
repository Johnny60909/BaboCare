schema: spec-driven

rules:
  proposal:
    - Include rollback plan
    - Identify affected teams
  specs:
    - Use Given/When/Then format for scenarios
  design:
    - Include sequence diagrams for complex flows

technical-stack:
  backend: 
    - .NET 10, EF Core 10
  database: 
    - PostgreSQL (Npgsql)
  identity: 
    - OpenIddict (Password Flow)
  frontend: 
    - React, React Router, TypeScript
  ui-library: 
    - Mantine UI, Tailwind CSS
  api-conventions: 
    - RESTful, JSON responses

module-index:
  backend-logic: 
    - "./tech-backend.md"
  frontend-logic: 
    - "./tech-frontend.md"
  security-logic: 
    - "./tech-identity.md"